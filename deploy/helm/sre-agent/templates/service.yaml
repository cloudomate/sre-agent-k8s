apiVersion: v1
kind: Service
metadata:
  name: {{ include "sre-agent.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "sre-agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
{{- if .Values.service.loadBalancer.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sre-agent.name" . }}-external
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  selector:
    {{- include "sre-agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.loadBalancer.port }}
      targetPort: {{ .Values.service.port }}
{{- end }}
