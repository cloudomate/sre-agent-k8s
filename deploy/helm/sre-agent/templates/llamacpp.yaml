{{- if .Values.llamacpp.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llamacpp-models
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.llamacpp.persistence.storageClass }}
  storageClassName: {{ .Values.llamacpp.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.llamacpp.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamacpp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "sre-agent.llamacpp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sre-agent.llamacpp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: llama-server
          image: {{ .Values.llamacpp.image.repository }}:{{ .Values.llamacpp.image.tag }}
          imagePullPolicy: {{ .Values.llamacpp.image.pullPolicy }}
          args:
            - "--model"
            - "/models/qwen3.5.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - {{ .Values.llamacpp.port | quote }}
            - "--ctx-size"
            - {{ .Values.llamacpp.ctxSize | quote }}
            - "--n-predict"
            - "-1"
            - "--embedding"
            - "--parallel"
            - {{ .Values.llamacpp.parallel | quote }}
            - "--log-disable"
          ports:
            - containerPort: {{ .Values.llamacpp.port }}
              name: http
          resources:
            requests:
              cpu: {{ .Values.llamacpp.resources.requests.cpu | quote }}
              memory: {{ .Values.llamacpp.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.llamacpp.resources.limits.cpu | quote }}
              memory: {{ .Values.llamacpp.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.llamacpp.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.llamacpp.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: llamacpp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "sre-agent.llamacpp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.llamacpp.port }}
      targetPort: {{ .Values.llamacpp.port }}
{{- end }}
