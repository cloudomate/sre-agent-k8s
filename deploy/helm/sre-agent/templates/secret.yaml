apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sre-agent.name" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.llm.apiKey | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.slack.webhookUrl | quote }}
  TEAMS_WEBHOOK_URL: {{ .Values.teams.webhookUrl | quote }}
  REPORT_WEBHOOK_URL: {{ .Values.webhook.reportUrl | quote }}
  RESEND_API_KEY: {{ .Values.resend.apiKey | quote }}
  TWILIO_ACCOUNT_SID: {{ .Values.twilio.accountSid | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.twilio.authToken | quote }}
  SMTP_PASSWORD: {{ .Values.smtp.password | quote }}
