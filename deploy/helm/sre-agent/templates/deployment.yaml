apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sre-agent.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sre-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sre-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sre-agent.name" . }}
      containers:
        - name: sre-agent
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "sre-agent.name" . }}-config
            - secretRef:
                name: {{ include "sre-agent.name" . }}-secrets
          volumeMounts:
            - name: reports
              mountPath: {{ .Values.report.dir }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: {{ include "sre-agent.name" . }}-reports
