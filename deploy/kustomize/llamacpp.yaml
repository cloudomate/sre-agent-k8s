---
# PVC for optional model overrides — model is baked into the container image
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llamacpp-models
  namespace: sre-agent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 15Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamacpp
  namespace: sre-agent
  labels:
    app: llamacpp
spec:
  replicas: 1
  # Recreate is required for RWO PVCs
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llamacpp
  template:
    metadata:
      labels:
        app: llamacpp
    spec:
      containers:
        - name: llama-server
          # Model is baked in — starts immediately, no download on startup
          image: cr.imys.in/hci/llama-qwen3-4b:latest
          imagePullPolicy: Always
          # Args override CMD defaults in the image
          args:
            - "--model"
            - "/models/qwen3.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "11434"
            - "--ctx-size"
            - "16384"
            - "--n-predict"
            - "-1"
            - "--embedding"
            - "--parallel"
            - "2"
            - "--log-disable"

          ports:
            - containerPort: 11434
              name: http

          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /health
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: llamacpp
  namespace: sre-agent
  labels:
    app: llamacpp
spec:
  selector:
    app: llamacpp
  ports:
    - name: http
      port: 11434
      targetPort: 11434
  type: ClusterIP
