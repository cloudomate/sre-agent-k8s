apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-agent
  namespace: sre-agent
  labels:
    app: sre-agent
spec:
  # Single replica — LLM inference is sequential and stateful
  replicas: 1
  selector:
    matchLabels:
      app: sre-agent
  template:
    metadata:
      labels:
        app: sre-agent
    spec:
      serviceAccountName: sre-agent

      containers:
        - name: sre-agent
          image: cr.imys.in/hci/sre-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http

          envFrom:
            - configMapRef:
                name: sre-agent-config
            - secretRef:
                name: sre-agent-secrets

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: reports
              mountPath: /app/reports

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: sre-agent-reports
