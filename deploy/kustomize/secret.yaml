# Template — fill in base64-encoded values before applying.
# To encode: echo -n 'your-value' | base64
#
# For Ollama/local models, LLM_API_KEY can be any non-empty string (e.g. "ollama").
# For OpenAI, set LLM_API_KEY to your real API key.
apiVersion: v1
kind: Secret
metadata:
  name: sre-agent-secrets
  namespace: sre-agent
type: Opaque
data:
  # echo -n 'ollama' | base64
  LLM_API_KEY: b2xsYW1h
  # echo -n 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL' | base64
  SLACK_WEBHOOK_URL: ""
  # echo -n 'https://your-teams-domain.webhook.office.com/...' | base64
  TEAMS_WEBHOOK_URL: ""
  # echo -n 'https://your-portal/webhook' | base64
  REPORT_WEBHOOK_URL: ""
  # Resend API key (for email via Resend)
  # echo -n 're_xxxxxxxxxxxxxxxxxxxxxxxxxxxx' | base64
  RESEND_API_KEY: ""
  # Twilio (for SMS and WhatsApp)
  # echo -n 'ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx' | base64
  TWILIO_ACCOUNT_SID: ""
  # echo -n 'your_auth_token' | base64
  TWILIO_AUTH_TOKEN: ""
  # SMTP password (for email)
  # echo -n 'your_smtp_password' | base64
  SMTP_PASSWORD: ""
  # HuggingFace token for model downloads (required for GGUF model pull)
  # Generate at: https://huggingface.co/settings/tokens
  # echo -n 'hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxx' | base64
  HF_TOKEN: ""
